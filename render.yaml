services:
  - type: worker
    name: ddalgak-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_APP_TOKEN
        sync: false
      - key: SLACK_SIGNING_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: JIRA_EMAIL
        sync: false
      - key: JIRA_API_TOKEN
        sync: false
      - key: NOTION_API_KEY
        sync: false
      - key: CLAUDE_MODEL
        value: claude-sonnet-4-20250514
      - key: BOT_NAME
        value: 딸깍봇
      - key: JIRA_BASE_URL
        value: https://aeconsultingofficial.atlassian.net
      - key: JIRA_PROJECT_KEY
        value: SCRUM
      - key: NOTION_MAIN_PAGE_ID
        value: 31551ceb4ac880f49867e23e44aa23fb
      - key: NOTION_TASKS_DB_ID
        value: 32c51ceb4ac880dd84eef8e9462ab03e
      - key: NOTIFY_CHANNEL_ID
        value: C0ARDGL6ZMM
